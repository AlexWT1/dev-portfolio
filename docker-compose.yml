services:
  postgres:
    image: postgres:16-alpine
    container_name: dev-portfolio-db
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devportfolio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devportfolio_pass}
      POSTGRES_DB: ${POSTGRES_DB:-devportfolio}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
